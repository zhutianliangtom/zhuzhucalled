<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>校园失物招领 - App 下载</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      width: 100%;
      max-width: 400px;
      overflow: hidden;
    }
    .hero {
      background: #1e293b;
      padding: 36px 28px 28px;
      text-align: center;
      color: #fff;
      position: relative;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 24px;
      background: #fff;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }
    .app-icon {
      width: 72px; height: 72px;
      border-radius: 16px;
      background: #fff;
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
    }
    .hero h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    .hero p { font-size: 13px; color: #94a3b8; }
    .body { padding: 28px; }
    .version-info {
      background: #f8f9fa;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 16px 18px;
      margin-bottom: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .version-label { font-size: 12px; color: #9ca3af; }
    .version-value { font-size: 15px; font-weight: 600; color: #111; }
    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }
    .feature-item {
      background: #f8f9fa;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 14px 12px;
      text-align: center;
    }
    .feature-icon { font-size: 26px; margin-bottom: 6px; }
    .feature-name { font-size: 12px; color: #6b7280; font-weight: 500; }
    .changelog { margin-bottom: 20px; }
    .changelog h3 { font-size: 14px; color: #374151; margin-bottom: 10px; font-weight: 600; }
    .changelog ul { list-style: none; padding: 0; }
    .changelog li {
      font-size: 13px; color: #6b7280; padding: 5px 0;
      display: flex; align-items: center; gap: 8px;
    }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: #2563eb; flex-shrink: 0; }
    .download-btn {
      display: block; width: 100%; padding: 14px;
      background: #2563eb; color: #fff; border: none;
      border-radius: 8px; font-size: 16px; font-weight: 600;
      cursor: pointer; text-align: center; text-decoration: none;
      transition: background 0.2s;
    }
    .download-btn:hover { background: #1d4ed8; }
    .download-btn:active { transform: scale(0.98); }
    .download-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .meta { text-align: center; margin-top: 14px; font-size: 12px; color: #9ca3af; }
    .loading { text-align: center; padding: 30px; color: #9ca3af; font-size: 14px; }
    .loading p { margin-bottom: 12px; }
    .error-msg { background: #fef2f2; color: #991b1b; padding: 14px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; text-align: center; border: 1px solid #fecaca; }
    .error-msg p { margin-bottom: 8px; }
    .retry-btn {
      display: inline-block; padding: 7px 24px;
      background: #2563eb; color: #fff; border: none;
      border-radius: 6px; font-size: 13px; cursor: pointer; margin-top: 6px;
    }
    .retry-btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="card" id="app">
    <div class="hero">
      <div class="app-icon">📦</div>
      <h1>校园失物招领</h1>
      <p>让失物不再迷路</p>
    </div>
    <div class="body">
      <div v-if="loading" class="loading">
        <p>正在获取最新版本...</p>
        <button class="retry-btn" @click="fetchLatest">刷新</button>
      </div>
      <div v-else-if="error" class="error-msg">
        <p>{{ error }}</p>
        <button class="retry-btn" @click="fetchLatest">重试</button>
      </div>
      <template v-else-if="latest">
        <div class="version-info">
          <div>
            <div class="version-label">当前版本</div>
            <div class="version-value">v{{ latest.version }}</div>
          </div>
          <div style="text-align:right">
            <div class="version-label">发布时间</div>
            <div class="version-value" style="font-size:12px;color:#9ca3af;">{{ formatDate(latest.createdAt) }}</div>
          </div>
        </div>
        <div class="features">
          <div class="feature-item"><div class="feature-icon">🔍</div><div class="feature-name">快速寻物</div></div>
          <div class="feature-item"><div class="feature-icon">💬</div><div class="feature-name">即时聊天</div></div>
          <div class="feature-item"><div class="feature-icon">🔔</div><div class="feature-name">消息通知</div></div>
          <div class="feature-item"><div class="feature-icon">🔒</div><div class="feature-name">安全可靠</div></div>
        </div>
        <div class="changelog" v-if="changelogList.length">
          <h3>📝 更新日志</h3>
          <ul>
            <li v-for="(item, idx) in changelogList" :key="idx">
              <span class="dot"></span><span>{{ item }}</span>
            </li>
          </ul>
        </div>
        <button @click="handleDownload" :disabled="downloading" class="download-btn" v-if="latest.apkUrl">
          <span v-if="downloading">下载中...</span>
          <span v-else>⬇ 立即下载 v{{ latest.version }}</span>
        </button>
        <div v-else class="error-msg" style="margin-bottom:0">暂无安装包，请联系管理员上传</div>
        <div class="meta">适用于 Android 5.0 及以上</div>
      </template>
      <div v-else class="error-msg">暂未发布版本，请稍后再试</div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script>
    const { createApp } = Vue
    const app = {
      data() {
        return { latest: null, loading: true, error: '', downloading: false }
      },
      computed: {
        changelogList() {
          if (!this.latest || !this.latest.changelog) return []
          return this.latest.changelog.split('\n').filter(l => l.trim())
        }
      },
      methods: {
        formatDate(ts) {
          if (!ts) return ''
          const d = new Date(ts * 1000)
          return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0')
        },
        async fetchLatest() {
          this.loading = true; this.error = ''
          try {
            const ctrl = new AbortController()
            const timer = setTimeout(() => ctrl.abort(), 10000)
            const res = await fetch('/version/latest', { signal: ctrl.signal })
            clearTimeout(timer)
            if (!res.ok) throw new Error('服务器返回 ' + res.status)
            const json = await res.json()
            if (json.data) this.latest = json.data
            else { this.latest = null; this.error = '暂无可用版本，请联系管理员上传安装包' }
          } catch (e) {
            this.error = e.name === 'AbortError' ? '请求超时，请检查网络后重试' : '获取版本信息失败，请检查网络连接'
          } finally { this.loading = false }
        },
        async handleDownload() {
          if (this.downloading || !this.latest || !this.latest.id) return
          this.downloading = true
          try {
            const urlRes = await fetch('/version/' + this.latest.id + '/download-url')
            const urlJson = await urlRes.json()
            if (urlJson.data && urlJson.data.url) {
              const a = document.createElement('a')
              a.href = '/download/encrypted/' + urlJson.data.url
              a.click()
            } else if (this.latest.apkUrl) {
              const a = document.createElement('a')
              a.href = this.latest.apkUrl
              a.click()
            } else { this.error = '暂无可用下载链接' }
          } catch (e) { this.error = '下载失败，请重试' }
          finally { this.downloading = false }
        }
      },
      async mounted() { await this.fetchLatest() }
    }
    createApp(app).mount('#app')
  </script>
</body>
</html>
