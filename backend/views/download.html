<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>校园失物招领 - App 下载</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }

    .hero {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 40px 30px 30px;
      text-align: center;
      color: #fff;
      position: relative;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0; right: 0;
      height: 30px;
      background: #fff;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }

    .app-icon {
      width: 90px;
      height: 90px;
      border-radius: 22px;
      background: #fff;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 46px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }

    .hero h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .hero p {
      font-size: 14px;
      opacity: 0.85;
    }

    .body {
      padding: 30px;
    }

    .version-info {
      background: #f5f7fa;
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .version-label {
      font-size: 13px;
      color: #999;
    }

    .version-value {
      font-size: 16px;
      font-weight: 700;
      color: #333;
    }

    .changelog {
      margin-bottom: 26px;
    }

    .changelog h3 {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .changelog ul {
      list-style: none;
      padding: 0;
    }

    .changelog li {
      font-size: 13px;
      color: #555;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .changelog li:last-child { border: none; }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #667eea;
      flex-shrink: 0;
    }

    .download-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 6px 20px rgba(102,126,234,0.4);
    }

    .download-btn:hover { opacity: 0.92; }
    .download-btn:active { transform: scale(0.97); }

    .meta {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: #bbb;
    }

    .loading {
      text-align: center;
      padding: 30px;
      color: #999;
      font-size: 14px;
    }

    .error-msg {
      background: #fff0f0;
      color: #e74c3c;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
      text-align: center;
    }

    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 26px;
    }

    .feature-item {
      background: #f5f7fa;
      border-radius: 12px;
      padding: 16px 14px;
      text-align: center;
    }

    .feature-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .feature-name {
      font-size: 13px;
      color: #555;
      font-weight: 600;
    }

    @media (max-width: 480px) {
      .card { border-radius: 20px; }
      .hero { padding: 32px 24px 24px; }
      .body { padding: 24px; }
    }
  </style>
</head>
<body>
  <div class="card" id="app">
    <!-- 顶部 Hero -->
    <div class="hero">
      <div class="app-icon">📦</div>
      <h1>校园失物招领</h1>
      <p>让失物不再迷路</p>
    </div>

    <!-- 主体 -->
    <div class="body">
      <div v-if="loading" class="loading">正在获取最新版本...</div>

      <div v-else-if="error" class="error-msg">{{ error }}</div>

      <template v-else-if="latest">
        <!-- 版本信息 -->
        <div class="version-info">
          <div>
            <div class="version-label">当前版本</div>
            <div class="version-value">v{{ latest.version }}</div>
          </div>
          <div style="text-align:right">
            <div class="version-label">发布时间</div>
            <div class="version-value" style="font-size:13px;color:#888">{{ formatDate(latest.createdAt) }}</div>
          </div>
        </div>

        <!-- 功能亮点 -->
        <div class="features">
          <div class="feature-item">
            <div class="feature-icon">🔍</div>
            <div class="feature-name">快速寻物</div>
          </div>
          <div class="feature-item">
            <div class="feature-icon">💬</div>
            <div class="feature-name">即时聊天</div>
          </div>
          <div class="feature-item">
            <div class="feature-icon">🔔</div>
            <div class="feature-name">消息通知</div>
          </div>
          <div class="feature-item">
            <div class="feature-icon">🔒</div>
            <div class="feature-name">安全可靠</div>
          </div>
        </div>

        <!-- 更新日志 -->
        <div class="changelog" v-if="changelogList.length">
          <h3>📝 更新日志</h3>
          <ul>
            <li v-for="(item, idx) in changelogList" :key="idx">
              <span class="dot"></span>
              <span>{{ item }}</span>
            </li>
          </ul>
        </div>

        <!-- 下载按钮 -->
        <a
          :href="apiBase + latest.apkUrl"
          download
          class="download-btn"
          v-if="latest.apkUrl"
        >
          ⬇ 立即下载 v{{ latest.version }}
        </a>
        <div v-else class="error-msg" style="margin-bottom:0">暂无安装包，请联系管理员上传</div>

        <div class="meta">适用于 Android 5.0 及以上</div>
      </template>

      <div v-else class="error-msg">暂未发布版本，请稍后再试</div>
    </div>
  </div>

  <script>
    // 直接写死后端 API 地址（5000 端口）,避免跨端口自动拼错
    const API_BASE = 'http://183.66.27.20:41412'

    const app = {
      data() {
        return {
          apiBase: API_BASE,
          latest: null,
          loading: true,
          error: ''
        }
      },
      computed: {
        changelogList() {
          if (!this.latest || !this.latest.changelog) return []
          return this.latest.changelog.split('\n').filter(l => l.trim())
        }
      },
      methods: {
        formatDate(ts) {
          if (!ts) return ''
          const d = new Date(ts * 1000)
          const mm = String(d.getMonth()+1).padStart(2,'0')
          const dd = String(d.getDate()).padStart(2,'0')
          return `${d.getFullYear()}-${mm}-${dd}`
        },
        async fetchLatest() {
          this.loading = true
          this.error = ''
          try {
            const res = await fetch(`${API_BASE}/version/latest`)
            const json = await res.json()
            if (json.data) {
              this.latest = json.data
            } else {
              this.latest = null
            }
          } catch (e) {
            this.error = '获取版本信息失败，请检查网络连接'
          } finally {
            this.loading = false
          }
        }
      },
      mounted() {
        this.fetchLatest()
      }
    }

    Vue.createApp(app).mount('#app')
  </script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</body>
</html>
